<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ══════════════════════════════════════
       SAME DUSKY BACKGROUND AS ALL PAGES
       lib2.jpeg + 4-layer overlay stack
    ══════════════════════════════════════ */

    /* Layer 1 — photo */
    .bg-photo {
      position: fixed; inset: 0; z-index: 0;
      background: url('/lib2.jpeg') center / cover no-repeat;
      filter: brightness(0.52) saturate(0.6);
      transform: scale(1.04);
      animation: slowZoom 30s ease-in-out infinite alternate;
    }
    @keyframes slowZoom { from{transform:scale(1.04);}to{transform:scale(1.11);} }

    /* Layer 2 — dark gradient */
    .bg-dusk {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: linear-gradient(to bottom,
        rgba(8,4,2,.75)  0%,
        rgba(14,6,2,.50) 30%,
        rgba(10,4,2,.52) 65%,
        rgba(6,2,1,.85)  100%);
    }

    /* Layer 3 — warm amber glow */
    .bg-glow {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%,   rgba(160,80,20,.22)  0%, transparent 65%),
        radial-gradient(ellipse 38% 50% at 8%  50%,  rgba(100,50,10,.13)  0%, transparent 55%),
        radial-gradient(ellipse 38% 50% at 92% 50%,  rgba(100,50,10,.13)  0%, transparent 55%);
    }

    /* Layer 4 — vignette */
    .bg-vignette {
      position: fixed; inset: 0; z-index: 3; pointer-events: none;
      background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 28%, rgba(0,0,0,.8) 100%);
    }

    /* Floating dust canvas */
    #dust-canvas { position: fixed; inset: 0; z-index: 4; pointer-events: none; }

    /* ── Page ── */
    .lib-home {
      position: relative; z-index: 5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
    }

    /* ════════════════════════════
       GLASSMORPHISM CARD
       Same style as all other pages
    ════════════════════════════ */
    .hero-card {
      position: relative;
      background: rgba(10, 5, 2, 0.72);
      backdrop-filter: blur(32px) saturate(1.5);
      -webkit-backdrop-filter: blur(32px) saturate(1.5);
      border: 1px solid rgba(200,140,40,.22);
      border-radius: 28px;
      padding: 62px 56px 56px;
      max-width: 568px;
      width: 100%;
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(255,255,255,.04),
        0 8px 12px rgba(0,0,0,.3),
        0 40px 100px rgba(0,0,0,.85),
        inset 0 1px 0 rgba(240,180,60,.1),
        inset 0 -1px 0 rgba(0,0,0,.4);
      animation: cardRise 1s cubic-bezier(.22,1,.36,1) both;
      overflow: hidden;
    }

    /* Inner glass sheen */
    .hero-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,.03) 0%, transparent 100%);
      pointer-events: none; border-radius: 28px 28px 0 0;
    }

    /* Gold top glow line */
    .hero-card::after {
      content: '';
      position: absolute; top: 0; left: 8%; right: 8%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,195,70,.65), transparent);
    }

    @keyframes cardRise {
      from { opacity:0; transform:translateY(55px) scale(.96); }
      to   { opacity:1; transform:none; }
    }

    /* ── Icon ── */
    .hero-icon {
      font-size: 3.4rem; display: block; margin-bottom: 18px;
      animation: bob 4s ease-in-out infinite;
      filter: drop-shadow(0 0 22px rgba(240,175,50,.65));
    }
    @keyframes bob { 0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);} }

    /* ── Pill ── */
    .pill {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(160,90,10,.2);
      border: 1px solid rgba(240,175,55,.32);
      border-radius: 50px; padding: 6px 18px;
      font-size: .7rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
      color: rgba(255,210,85,.92); margin-bottom: 24px;
    }
    .pill-dot {
      width: 6px; height: 6px; background: #ffc845;
      border-radius: 50%; box-shadow: 0 0 9px rgba(255,200,60,1);
      animation: pdot 2s ease infinite;
    }
    @keyframes pdot { 0%,100%{opacity:1;}50%{opacity:.18;} }

    /* ── Heading ── */
    .hero-h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem,4vw,2.6rem);
      font-weight: 900; color: #fff;
      line-height: 1.18; letter-spacing: -.02em; margin-bottom: 20px;
      text-shadow: 0 2px 32px rgba(0,0,0,.85);
    }
    .grad-text {
      font-style: italic;
      background: linear-gradient(90deg,#f5c842,#ffaa30,#ff8c42);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Tagline ── */
    .hero-tagline {
      font-size: .96rem; line-height: 1.8;
      color: rgba(255,255,255,.4); font-weight: 300; margin-bottom: 30px;
    }
    .hero-tagline b { color: rgba(255,255,255,.68); font-weight: 600; }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200,130,30,.35), transparent);
      margin-bottom: 28px;
    }

    /* ── Stats ── */
    .stats { display:flex; align-items:center; justify-content:center; margin-bottom: 40px; }
    .stat  { display:flex; flex-direction:column; align-items:center; padding: 0 28px; }
    .stat-n {
      font-family:'Playfair Display',serif;
      font-size:1.9rem; font-weight:700; color:#fff; line-height:1;
    }
    .stat-n sup { font-family:'DM Sans',sans-serif; font-size:.78rem; color:#ffc845; font-weight:700; }
    .stat-l { font-size:.63rem; letter-spacing:.1em; text-transform:uppercase; color:rgba(255,220,130,.32); margin-top:5px; }
    .stat-div { width:1px; height:34px; background:rgba(200,130,30,.22); }

    /* ── CTA ── */
    .cta-btn {
      display: inline-flex; align-items: center; gap: 10px;
      background: #fff; color: #000 !important; text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-size: .93rem; font-weight: 700;
      padding: 15px 42px; border-radius: 50px; letter-spacing: .04em;
      box-shadow: 0 0 0 1px rgba(255,255,255,.16), 0 12px 44px rgba(0,0,0,.7);
      transition: background .22s, transform .22s, box-shadow .22s;
    }
    .cta-btn:hover {
      background: #f0c060; color: #000 !important;
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 0 38px rgba(240,192,96,.55), 0 20px 52px rgba(0,0,0,.65);
      text-decoration: none;
    }
    .cta-arr {
      width: 22px; height: 22px; background: rgba(0,0,0,.1);
      border-radius: 50%; display:flex; align-items:center; justify-content:center;
      font-size: .8rem; transition: transform .2s;
    }
    .cta-btn:hover .cta-arr { transform: translateX(3px); }

    /* ── Responsive ── */
    @media(max-width:600px){
      .hero-card { padding:40px 24px 36px; border-radius:22px; }
      .hero-h1   { font-size:1.5rem; }
      .stat      { padding:0 14px; }
      .stat-n    { font-size:1.4rem; }
      .cta-btn   { padding:13px 26px; }
    }
  </style>
</head>
<body>

<!-- Same 4-layer dusky background as all pages -->
<div class="bg-photo"></div>
<div class="bg-dusk"></div>
<div class="bg-glow"></div>
<div class="bg-vignette"></div>
<canvas id="dust-canvas"></canvas>

<div class="lib-home">
  <div class="hero-card">

    <span class="hero-icon">📚</span>
    <div class="pill"><span class="pill-dot"></span> Online Library System</div>

    <h1 class="hero-h1">
      Welcome to the<br>
      <span class="grad-text">Online Library</span><br>
      Management System
    </h1>

    <p class="hero-tagline">
      Explore, read, borrow, and discover —<br>
      <b>your library is now digital.</b>
    </p>

    <div class="divider"></div>

    <div class="stats">
      <div class="stat"><span class="stat-n">12<sup>k+</sup></span><span class="stat-l">Books</span></div>
      <div class="stat-div"></div>
      <div class="stat"><span class="stat-n">3<sup>k+</sup></span><span class="stat-l">Members</span></div>
      <div class="stat-div"></div>
      <div class="stat"><span class="stat-n">98<sup>%</sup></span><span class="stat-l">Satisfied</span></div>
    </div>

    <a class="cta-btn" href="/student">
      🚀 Get Started <span class="cta-arr">→</span>
    </a>

  </div>
</div>

<script>
/* Same floating dust motes as every other page */
const c = document.getElementById('dust-canvas'), ctx = c.getContext('2d');
function resize(){ c.width = innerWidth; c.height = innerHeight; }
resize(); addEventListener('resize', resize);
const M = Array.from({length:55}, ()=>({
  x:Math.random()*innerWidth, y:Math.random()*innerHeight,
  r:Math.random()*1.5+0.4, vx:(Math.random()-.5)*.18, vy:-(Math.random()*.22+.05),
  o:Math.random()*.28+.06, p:Math.random()*Math.PI*2, ps:Math.random()*.003+.001
}));
(function frame(t){
  ctx.clearRect(0,0,c.width,c.height);
  M.forEach(m=>{
    const a = m.o*(0.5+0.5*Math.sin(t*m.ps+m.p));
    ctx.beginPath(); ctx.arc(m.x,m.y,m.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,210,100,${a.toFixed(3)})`; ctx.fill();
    m.x+=m.vx; m.y+=m.vy;
    if(m.y<-4){m.y=c.height+4;m.x=Math.random()*c.width;}
    if(m.x<-4)m.x=c.width+4; if(m.x>c.width+4)m.x=-4;
  });
  requestAnimationFrame(frame);
})();
</script>

</body>
</html>
