<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Library Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ink:      #0d0b0f;
      --card:     #1c1624;
      --border:   rgba(255,255,255,0.08);
      --gold:     #c9a84c;
      --gold-dim: rgba(201,168,76,0.12);
      --gold-glow:rgba(201,168,76,0.30);
      --cream:    #f0e8d5;
      --muted:    #7a6e88;
    }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }

    /* canvas sits behind everything */
    #bg {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* dark vignette so the card stays readable */
    .vignette {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, rgba(13,11,15,0.15) 0%, rgba(13,11,15,0.82) 100%);
      z-index: 1; pointer-events: none;
    }

    /* soft warm glow behind the card */
    .bloom {
      position: fixed;
      width: 720px; height: 560px;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      background: radial-gradient(ellipse, rgba(201,168,76,0.06) 0%, transparent 68%);
      z-index: 2; pointer-events: none;
      animation: breathe 7s ease-in-out infinite;
    }
    @keyframes breathe {
      0%,100%{ opacity:.75; transform:translate(-50%,-50%) scale(1);   }
      50%    { opacity:1;    transform:translate(-50%,-50%) scale(1.09);}
    }

    /* ─── CARD ──────────────────────────────── */
    .reset-container {
      position: relative; z-index: 10;
      width: 100%; max-width: 430px;
      background: var(--card);
      border: 1px solid rgba(201,168,76,0.14);
      border-radius: 20px;
      box-shadow:
        0 0 0 1px rgba(201,168,76,0.05),
        0 40px 100px rgba(0,0,0,0.72),
        0 0 70px  rgba(201,168,76,0.06);
      overflow: hidden;
      animation: riseIn .7s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes riseIn {
      from { opacity:0; transform:translateY(38px) scale(.96); }
      to   { opacity:1; transform:translateY(0)    scale(1);   }
    }

    .gold-bar {
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold) 30%, #e8c96a 60%, transparent);
    }

    /* ─── HEADER ──────────────────────────── */
    .reset-header {
      padding: 26px 30px 20px;
      display: flex; align-items: center; gap: 15px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      width: 44px; height: 44px;
      background: var(--gold-dim);
      border: 1px solid rgba(201,168,76,0.24);
      border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 26px var(--gold-glow);
    }
    .logo i { font-size: 18px; color: var(--gold); }
    .portal-info { display:flex; flex-direction:column; gap:2px; }
    .portal-eyebrow {
      font-size:10px; font-weight:600;
      letter-spacing:.18em; text-transform:uppercase; color:var(--gold);
    }
    .portal-title { font-size:15.5px; font-weight:700; color:var(--cream); }

    /* ─── FORM ────────────────────────────── */
    .reset-form-container { padding: 28px 30px 26px; }

    .form-title {
      font-size:23px; font-weight:800; letter-spacing:-.03em;
      color:var(--cream); margin-bottom:5px;
    }
    .form-subtitle {
      color:var(--muted); font-size:13.5px; line-height:1.6; margin-bottom:26px;
    }

    .alert {
      padding:12px 14px; border-radius:11px; margin-bottom:20px;
      font-size:13px; font-weight:500;
      display:flex; align-items:center; gap:9px;
    }
    .alert-danger  { background:rgba(224,92,110,.10); border:1px solid rgba(224,92,110,.2); color:#f08090; }
    .alert-success { background:rgba(86,196,139,.09); border:1px solid rgba(86,196,139,.2); color:#56c48b; }

    .form-group { margin-bottom:17px; }
    .form-label {
      display:block; font-size:11px; font-weight:600;
      letter-spacing:.1em; text-transform:uppercase;
      color:var(--muted); margin-bottom:7px;
    }

    .input-wrapper { position:relative; }
    .form-input {
      width:100%; height:50px;
      padding:0 46px 0 44px;
      background:rgba(255,255,255,0.04);
      border:1px solid var(--border);
      border-radius:12px;
      font-family:'Sora',sans-serif; font-size:14px; font-weight:500;
      color:var(--cream);
      transition:border-color .22s, box-shadow .22s, background .22s;
      -webkit-appearance:none;
    }
    .form-input::placeholder { color:rgba(122,110,136,.65); font-weight:400; }
    .form-input:hover { background:rgba(255,255,255,.06); border-color:rgba(255,255,255,.14); }
    .form-input:focus {
      outline:none;
      background:rgba(201,168,76,.05);
      border-color:var(--gold);
      box-shadow:0 0 0 3px rgba(201,168,76,.10);
    }
    .input-icon {
      position:absolute; left:15px; top:50%; transform:translateY(-50%);
      color:var(--muted); font-size:14px; pointer-events:none;
      transition:color .22s;
    }
    .input-wrapper:focus-within .input-icon { color:var(--gold); }
    .password-toggle {
      position:absolute; right:12px; top:50%; transform:translateY(-50%);
      background:none; border:none; color:var(--muted);
      cursor:pointer; padding:6px; border-radius:8px;
      font-size:13px; line-height:1;
      transition:color .2s, background .2s;
    }
    .password-toggle:hover { color:var(--gold); background:var(--gold-dim); }

    /* captcha */
    .captcha-row { display:flex; gap:10px; margin-bottom:10px; }
    .captcha-box {
      flex:1; height:50px;
      background:rgba(201,168,76,.05);
      border:1px solid rgba(201,168,76,.18);
      border-radius:12px;
      display:flex; align-items:center; justify-content:center;
      font-family:'JetBrains Mono',monospace;
      font-size:20px; font-weight:700; letter-spacing:8px;
      color:var(--gold);
      text-shadow:0 0 14px var(--gold-glow);
      user-select:none; overflow:hidden; position:relative;
    }
    .captcha-box::before {
      content:''; position:absolute; inset:0;
      background:repeating-linear-gradient(
        52deg, transparent, transparent 6px,
        rgba(201,168,76,.03) 6px, rgba(201,168,76,.03) 7px
      );
    }
    .captcha-refresh {
      height:50px; padding:0 15px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--border); border-radius:12px;
      font-family:'Sora',sans-serif; font-size:12.5px; font-weight:600;
      color:var(--muted); cursor:pointer;
      display:flex; align-items:center; gap:7px;
      transition:all .22s; white-space:nowrap;
    }
    .captcha-refresh:hover { background:var(--gold-dim); border-color:rgba(201,168,76,.28); color:var(--gold); }
    .captcha-refresh i { font-size:11px; transition:transform .45s ease; }
    .captcha-refresh:hover i { transform:rotate(180deg); }

    .btn-primary {
      width:100%; height:50px; margin-top:6px;
      background:var(--gold); border:none; border-radius:12px;
      font-family:'Sora',sans-serif; font-size:13.5px; font-weight:700;
      letter-spacing:.06em; text-transform:uppercase;
      color:#170f00; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:9px;
      transition:all .25s cubic-bezier(.34,1.56,.64,1);
      box-shadow:0 8px 30px rgba(201,168,76,.22);
      position:relative; overflow:hidden;
    }
    .btn-primary::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,transparent 55%);
      opacity:0; transition:opacity .25s;
    }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 16px 44px rgba(201,168,76,.38); }
    .btn-primary:hover::after { opacity:1; }
    .btn-primary:active { transform:translateY(0); }

    .form-footer {
      margin-top:22px; padding-top:20px;
      border-top:1px solid var(--border); text-align:center;
    }
    .back-link {
      display:inline-flex; align-items:center; gap:8px;
      color:var(--muted); text-decoration:none;
      font-size:13px; font-weight:500;
      padding:9px 16px; border-radius:10px;
      transition:all .2s;
    }
    .back-link:hover { background:var(--gold-dim); color:var(--gold); }
    .back-link:hover i { transform:translateX(-3px); }
    .back-link i { font-size:11px; transition:transform .2s; }

    @media(max-width:480px){
      .reset-header,.reset-form-container{ padding-left:20px; padding-right:20px; }
    }
  </style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="vignette"></div>
<div class="bloom"></div>

<div class="reset-container">
  <div class="gold-bar"></div>

  <div class="reset-header">
    <div class="logo"><i class="fas fa-book-open"></i></div>
    <div class="portal-info">
      <span class="portal-eyebrow">Digital Library</span>
      <span class="portal-title">Library Portal</span>
    </div>
  </div>

  <div class="reset-form-container">
    <h2 class="form-title">Reset Password</h2>
    <p class="form-subtitle">Create a strong new password for your account.</p>

    <div *ngIf="error" class="alert alert-danger">
      <i class="fas fa-exclamation-circle"></i>{{ error }}
    </div>
    <div *ngIf="message" class="alert alert-success">
      <i class="fas fa-check-circle"></i>{{ message }}
    </div>

    <div class="form-group">
      <label class="form-label">New Password</label>
      <div class="input-wrapper">
        <i class="fas fa-lock input-icon"></i>
        <input [type]="showNewPassword ? 'text' : 'password'"
          class="form-input" placeholder="Enter new password"
          [(ngModel)]="newPassword" name="newPassword"/>
        <button type="button" class="password-toggle" (click)="toggleNewPassword()">
          <i class="fas" [ngClass]="showNewPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
        </button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Confirm Password</label>
      <div class="input-wrapper">
        <i class="fas fa-lock input-icon"></i>
        <input [type]="showConfirmPassword ? 'text' : 'password'"
          class="form-input" placeholder="Confirm new password"
          [(ngModel)]="confirmPassword" name="confirmPassword"/>
        <button type="button" class="password-toggle" (click)="toggleConfirmPassword()">
          <i class="fas" [ngClass]="showConfirmPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
        </button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Captcha Verification</label>
      <div class="captcha-row">
        <div class="captcha-box">{{ captcha }}</div>
        <button type="button" class="captcha-refresh" (click)="generateCaptcha()">
          <i class="fas fa-sync-alt"></i> Refresh
        </button>
      </div>
      <div class="input-wrapper">
        <i class="fas fa-shield-alt input-icon"></i>
        <input type="text" class="form-input" placeholder="Enter the code above"
          [(ngModel)]="captchaInput" name="captchaInput" maxlength="6"/>
      </div>
    </div>

    <button class="btn-primary" (click)="changePassword()">
      <i class="fas fa-key"></i> Change Password
    </button>

    <div class="form-footer">
      <a routerLink="/login" class="back-link">
        <i class="fas fa-arrow-left"></i> Back to Login
      </a>
    </div>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('bg');
  const ctx = canvas.getContext('2d');

  const SPINE_COLORS = [
    '#2d1f0e','#3b1a12','#1a2d1a','#12213b','#2b1a30',
    '#3d2a08','#1e2e1e','#2a1530','#0e2233','#3a200a',
    '#4a3010','#1a3025','#241040','#35180e','#102030',
    '#3a1505','#0d1e30','#2a0e22','#163028','#3d1a00',
  ];
  const GOLD_TINTS = ['#c9a84c','#e8c96a','#d4b87a','#f0d890','#b89040'];

  function resize(){
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();

  /* ─── Book ─── */
  function makeBook(x, shelfY){
    const w  = 18 + Math.random()*26;
    const h  = 58 + Math.random()*58;
    const y  = shelfY - h;
    return {
      x, y, w, h,
      color:      SPINE_COLORS[Math.floor(Math.random()*SPINE_COLORS.length)],
      bandColor:  GOLD_TINTS[Math.floor(Math.random()*GOLD_TINTS.length)],
      hasBand:    Math.random() > .50,
      bandRel:    .2 + Math.random()*.38,
      bandH:      4  + Math.random()*7,
      /* float */
      floatAmp:   Math.random() > .55 ? 1.2 + Math.random()*3.5 : 0,
      floatSpd:   .25 + Math.random()*.65,
      floatPhs:   Math.random()*Math.PI*2,
      /* push */
      offset: 0, target: 0, vel: 0,
    };
  }

  let shelves = [];

  function buildShelves(){
    shelves = [];
    const W = canvas.width, H = canvas.height;
    const gap = 115;
    const rows = Math.ceil(H / gap) + 2;
    for(let r = 0; r < rows; r++){
      const sy = 55 + r * gap;
      const row = [];
      let cx = -15;
      while(cx < W + 35){
        const b = makeBook(cx, sy);
        row.push(b);
        cx += b.w + 1 + Math.random()*3;
      }
      shelves.push({ y: sy, books: row });
    }
  }
  buildShelves();
  window.addEventListener('resize', ()=>{ resize(); buildShelves(); });

  /* mouse interaction */
  const mouse = { x: -9999, y: -9999 };
  window.addEventListener('mousemove', e=>{
    mouse.x = e.clientX; mouse.y = e.clientY;
  });

  /* ─── Dust motes ─── */
  const MOTES = 80;
  const motes = Array.from({length:MOTES}, ()=>({
    x: Math.random()*window.innerWidth,
    y: Math.random()*window.innerHeight,
    r: .4 + Math.random()*1.4,
    a: .05 + Math.random()*.28,
    vx:(Math.random()-.5)*.15,
    vy:-.06 - Math.random()*.12,
    life: Math.random(),
    decay:.0008+Math.random()*.0025,
  }));

  function updateMote(m){
    m.x  += m.vx; m.y += m.vy;
    m.life -= m.decay;
    if(m.life <= 0 || m.y < -10){
      m.x = Math.random()*canvas.width;
      m.y = canvas.height + 5;
      m.life = .6 + Math.random()*.4;
    }
  }

  /* ─── Draw shelf plank ─── */
  function drawPlank(y){
    const W = canvas.width;
    const g = ctx.createLinearGradient(0,y,0,y+13);
    g.addColorStop(0,  '#4a3214');
    g.addColorStop(.45,'#5e4020');
    g.addColorStop(1,  '#1e0f04');
    ctx.fillStyle = g;
    ctx.fillRect(0, y, W, 13);
    /* grain */
    ctx.strokeStyle='rgba(255,200,80,.055)';
    ctx.lineWidth=.8;
    for(let i=0;i<5;i++){
      ctx.beginPath(); ctx.moveTo(0,y+1+i*2.2); ctx.lineTo(W,y+1+i*2.2); ctx.stroke();
    }
    /* highlight */
    ctx.strokeStyle='rgba(255,210,120,.2)';
    ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }

  /* ─── Draw book ─── */
  function drawBook(b, floatY){
    const x=b.x, y=b.y+floatY, w=b.w, h=b.h;

    ctx.fillStyle = b.color;
    ctx.beginPath(); ctx.roundRect(x,y,w,h,2); ctx.fill();

    /* spine highlight */
    const sg = ctx.createLinearGradient(x,0,x+w,0);
    sg.addColorStop(0,  'rgba(255,255,255,.13)');
    sg.addColorStop(.2, 'rgba(255,255,255,.03)');
    sg.addColorStop(1,  'rgba(0,0,0,.18)');
    ctx.fillStyle = sg;
    ctx.beginPath(); ctx.roundRect(x,y,w,h,2); ctx.fill();

    /* band */
    if(b.hasBand){
      ctx.globalAlpha = .52;
      ctx.fillStyle = b.bandColor;
      ctx.fillRect(x, b.y + b.h*b.bandRel + floatY, w, b.bandH);
      ctx.globalAlpha = 1;
    }

    /* top/bottom shadow */
    ctx.fillStyle = 'rgba(0,0,0,.40)';
    ctx.fillRect(x, y, w, 3);
    ctx.fillRect(x, y+h-3, w, 3);
  }

  /* ─── RENDER ─── */
  let t = 0;
  function frame(){
    t += .016;
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0,0,W,H);

    /* base bg */
    ctx.fillStyle='#0d0b0f'; ctx.fillRect(0,0,W,H);

    /* per-shelf warm underlighting */
    shelves.forEach(shelf=>{
      const ag = ctx.createLinearGradient(0,shelf.y-95,0,shelf.y+14);
      ag.addColorStop(0,'rgba(70,42,8,0)');
      ag.addColorStop(1,'rgba(55,30,4,.22)');
      ctx.fillStyle=ag; ctx.fillRect(0,shelf.y-95,W,109);
    });

    /* books + planks */
    shelves.forEach(shelf=>{
      shelf.books.forEach(b=>{
        /* spring physics push */
        const cx = b.x + b.w/2, cy = b.y + b.h/2;
        const dx = cx - mouse.x, dy = cy - mouse.y;
        const dist = Math.sqrt(dx*dx+dy*dy);
        b.target = dist < 130 ? -7*(1-dist/130) : 0;
        b.vel = b.vel*.82 + (b.target - b.offset)*.18;
        b.offset += b.vel;

        const floatY = b.floatAmp > 0
          ? Math.sin(t*b.floatSpd + b.floatPhs)*b.floatAmp + b.offset
          : b.offset;
        drawBook(b, floatY);
      });
      drawPlank(shelf.y);
    });

    /* mouse warm spotlight */
    const mg = ctx.createRadialGradient(mouse.x,mouse.y,0,mouse.x,mouse.y,240);
    mg.addColorStop(0,'rgba(201,168,76,.065)');
    mg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=mg; ctx.fillRect(0,0,W,H);

    /* dust motes */
    motes.forEach(m=>{
      updateMote(m);
      ctx.globalAlpha = m.a * m.life;
      ctx.fillStyle='#c9a84c';
      ctx.beginPath(); ctx.arc(m.x,m.y,m.r,0,Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;

    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
</body>
</html>
